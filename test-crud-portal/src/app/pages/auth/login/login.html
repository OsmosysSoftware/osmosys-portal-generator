<p-toast />
<app-floating-configurator />
<div class="bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-screen min-w-screen overflow-hidden">
  <div class="flex flex-col items-center justify-center">
    <div
      style="
        border-radius: 56px;
        padding: 0.3rem;
        background: linear-gradient(180deg, var(--primary-color) 10%, rgba(33, 150, 243, 0) 30%);
      "
    >
      <div class="w-full bg-surface-0 dark:bg-surface-900 py-20 px-8 sm:px-20" style="border-radius: 53px">
        <div class="text-center mb-8">
          <div class="text-surface-900 dark:text-surface-0 text-3xl font-medium mb-4">Welcome Back</div>
          <span class="text-muted-color font-medium">Sign in to continue</span>
        </div>

        <div>
          <label for="email" class="block text-surface-900 dark:text-surface-0 text-xl font-medium mb-2">Email</label>
          <input
            pInputText
            id="email"
            type="email"
            placeholder="Email address"
            class="w-full md:w-120 mb-8"
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
          />

          <label for="password" class="block text-surface-900 dark:text-surface-0 font-medium text-xl mb-2">Password</label>
          <p-password
            id="password"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            placeholder="Password"
            [toggleMask]="true"
            styleClass="mb-4"
            [fluid]="true"
            [feedback]="false"
          />

          <div class="flex items-center justify-between mt-2 mb-8 gap-8">
            <div class="flex items-center">
              <p-checkbox
                [ngModel]="rememberMe()"
                (ngModelChange)="rememberMe.set($event)"
                id="rememberme"
                [binary]="true"
                class="mr-2"
              />
              <label for="rememberme">Remember me</label>
            </div>
            <span class="font-medium no-underline ml-2 text-right cursor-pointer text-primary">Forgot password?</span>
          </div>

          <p-button
            label="Sign In"
            styleClass="w-full"
            [loading]="loading()"
            (onClick)="onLogin()"
          />

          <!-- Demo credentials — remove once your backend is configured -->
          <div class="mt-6 p-4 bg-surface-100 dark:bg-surface-800 rounded-lg">
            <div class="text-sm text-muted-color mb-2 font-medium">Demo credentials:</div>
            <div class="text-sm text-muted-color mb-1">
              <span class="font-medium">Admin:</span>
              <button type="button" class="text-primary cursor-pointer bg-transparent border-none p-0 font-mono text-sm" (click)="email.set('admin@example.com'); password.set('password')">admin&#64;example.com</button>
              / <span class="font-mono text-sm">password</span>
            </div>
            <div class="text-sm text-muted-color">
              <span class="font-medium">User:</span>
              <button type="button" class="text-primary cursor-pointer bg-transparent border-none p-0 font-mono text-sm" (click)="email.set('user@example.com'); password.set('password')">user&#64;example.com</button>
              / <span class="font-mono text-sm">password</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
